{% extends 'blog/base.html' %}

{% block title %}
Register - MyBlog
{% endblock %}

{% block body %}
<div class="content-section" style="max-width: 420px; margin: 1.5rem auto; padding: 1.5rem;">
    <div class="text-center mb-3">
        <h2 style="font-weight: 700; color: var(--text-dark); font-size: 1.5rem;">Create Account</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Join our community today</p>
    </div>

    <form method="post" id="registerid">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>

        <div class="mb-3">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Email</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Password</label>
            <input type="password" name="password1" class="form-control" placeholder="put your desired password" required>
        </div>

        <div class="mb-3">
            <label class="form-label" style="font-weight: 600; font-size: 0.9rem;">Confirm Password</label>
            <input type="password" name="password2" class="form-control" placeholder="retype" required>
        </div>

        <div class="d-grid gap-2 mt-3">
            <input type="submit" value="Create Account" class="btn btn-success">
        </div>
    </form>

    <div class="text-center mt-3">
        <p style="color: var(--text-muted); font-size: 0.85rem;">
            Already have an account?
            <a href="{% url 'login' %}" style="color: var(--primary-green-dark); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
